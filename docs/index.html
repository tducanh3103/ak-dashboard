<script>
// ── EARLY PRELOAD: chạy ngay khi browser parse <head> ──────────────────────
// Chỉ fetch tháng mặc định + tháng liền trước — các tháng khác prefetch SAU
window._earlyCache = {};
(function earlyPreload() {
  const API    = "https://script.google.com/macros/s/AKfycbzJaaAxK9d3rUT3RNWaoFRsWOS-KbVZM7pkSG3CJxAxIOVX-8_kYDCe55EeeifVpEqUOQ/exec";
  const MONTHS = ["2026-01","2026-02","2026-03","2026-04","2026-05"];
  const now    = new Date();
  const prev   = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const pk     = prev.getFullYear()+"-"+String(prev.getMonth()+1).padStart(2,"0");
  const target = MONTHS.includes(pk) ? pk : MONTHS[MONTHS.length-1];
  const idx    = MONTHS.indexOf(target);
  const toFetch= [target];
  if (idx > 0) toFetch.push(MONTHS[idx-1]);
  toFetch.forEach(m => {
    fetch(API+"?month="+m)
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d && !d.error) window._earlyCache[m] = d; })
      .catch(()=>{});
  });
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-primary: #39B54A;
  --green-bar:     #61D836;
  --blue-web:      #00A1FE;
  --black:         #000000;
  --text-default:  #333333;
  --text-muted:    #6E6E6E;
  --border-light:  #E0E0E0;
  --white:         #FFFFFF;
  --bg-page:       #F5F6F5;
  --border-box:    1px solid #000000;
  --header-h: 57px;
}
body { font-family: 'Helvetica Neue',HelveticaNeue,Helvetica,Arial,sans-serif; font-weight: 300; background: var(--bg-page); color: var(--text-default); font-size: 13px; line-height: 1.5; }

/* HEADER */
.header { background: var(--white); border-bottom: 1px solid var(--border-light); padding: 10px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 12px; height: var(--header-h); }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-wrap { width: 35px; height: 35px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.header-brand { font-size: 13px; font-weight: 700; text-transform: uppercase; line-height: 1.4; display: flex; flex-wrap: wrap; gap: 0 6px; align-items: baseline; }
.header-brand .name { color: var(--green-primary); }
.header-brand .sub  { color: var(--black); }
.header-ts { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* TABS — dùng --header-h để luôn đúng trên mọi thiết bị */
.tab-wrap { background: var(--white); border-bottom: 1px solid var(--border-light); padding: 10px 32px; display: flex; gap: 6px; flex-wrap: wrap; position: sticky; top: var(--header-h); z-index: 99; transition: transform 0.25s ease, opacity 0.25s ease; }
.tab-wrap.hide-tabs { transform: translateY(-110%); opacity: 0; pointer-events: none; }
.tab-btn { padding: 5px 18px; border-radius: 20px; border: 1px solid var(--border-light); background: transparent; color: var(--text-muted); font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover  { border-color: var(--green-primary); color: var(--green-primary); }
.tab-btn.active { background: var(--green-primary); color: #fff; border-color: var(--green-primary); font-weight: 500; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px 32px 48px; }
.slide { background: var(--white); margin-bottom: 28px; }
.slide-hd { padding: 12px 24px; display: flex; align-items: center; gap: 8px; }
.slide-hd .slogo { width: 22px; height: 22px; flex-shrink: 0; }
.slide-hd .slogo svg { width: 22px; height: 22px; }
.slide-hd .stxt { font-weight: 700; font-size: 12px; text-transform: uppercase; color: var(--black); }
.slide-hd .stxt .gn { color: var(--green-primary); }
.slide-body { padding: 20px 24px 20px; }
.row3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 18px; }
.row2 { display: grid; grid-template-columns: 2fr 1.1fr; gap: 16px; margin-bottom: 18px; }
.cbox { border: var(--border-box); position: relative; padding: 28px 14px 14px; }
.cbox-title { position: absolute; top: -14px; left: 14px; background: var(--white); padding: 2px 12px; font-weight: 700; font-size: 15px; color: var(--black); white-space: nowrap; line-height: 1.5; }
.legend { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.litem  { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-default); font-weight: 300; }
.ldot   { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.kpi { display: flex; align-items: flex-start; gap: 12px; margin-top: 12px; }
.kpi-num { font-size: 34px; font-weight: 700; color: var(--black); line-height: 1; }
.kpi-txt { font-size: 12px; color: var(--text-default); line-height: 1.6; }
.kpi-txt strong { font-weight: 500; }
.summary { border: var(--border-box); padding: 14px 16px; }
.summary h4 { font-size: 13px; font-weight: 500; color: var(--black); margin-bottom: 8px; }
.summary ul { list-style: disc; padding-left: 18px; }
.summary li { font-size: 12px; font-weight: 300; color: var(--text-default); line-height: 1.7; margin-bottom: 2px; }
.summary li strong { font-weight: 500; color: var(--black); }
.up   { color: #27ae60; font-weight: 500; }
.down { color: #e74c3c; font-weight: 500; }
.app-kpi { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 10px 8px; }
.app-kpi .big { font-size: 28px; font-weight: 700; color: var(--black); }
.app-kpi .sub { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.5; font-weight: 300; }
.donut-note { margin-top: 10px; width: auto; border-collapse: collapse; }

.donut-note .dn-pct  { font-weight: 700; color: var(--black); white-space: nowrap; padding-right: 8px; }
.donut-note .dn-name { color: var(--text-muted); white-space: nowrap; }
.loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 13px; }

/* SKELETON */
@keyframes shimmer { 0%{background-position:-800px 0} 100%{background-position:800px 0} }
.skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 4px; }

.pw-title { font-size: 20px; font-weight: 600; color: var(--black); }
.pw-sub   { font-size: 13px; color: var(--text-muted); font-weight: 300; margin-top: -8px; }
.pw-input { width: 100%; padding: 14px 18px; border: 1px solid var(--border-light); border-radius: 12px; font-family: inherit; font-size: 14px; color: var(--text-default); outline: none; transition: border-color 0.15s; background: #fafafa; }

  .row3 { grid-template-columns: 1fr 1fr; }

}

<script>
const PW_HASH   = "dc8f68e1937f6da455dbf7a7fc8935a539768cea2c5ad1d7170c90c709db476b";
const SESSION_KEY = "ak_auth";
const API       = "https://script.google.com/macros/s/AKfycbzJaaAxK9d3rUT3RNWaoFRsWOS-KbVZM7pkSG3CJxAxIOVX-8_kYDCe55EeeifVpEqUOQ/exec";
const MONTHS    = ["2026-01","2026-02","2026-03","2026-04","2026-05"];
const LBL       = {"2026-01":"T1/2026","2026-02":"T2/2026","2026-03":"T3/2026","2026-04":"T4/2026","2026-05":"T5/2026"};
const GREEN_BAR = "#61D836";
const BLUE_WEB  = "#00A1FE";
const TEXT_DEF  = "#333333";
const PAL_CAT   = ["#2E8B40","#61D836","#00CCA0","#1A6B2E","#00897B","#39B54A","#004444"];
const PAL_KENH  = ["#61D836","#00A1FE","#00897B","#1A6B2E","#A3D9FF"];
const cache = {}, charts = {};
const _now = new Date();
const _prev = new Date(_now.getFullYear(), _now.getMonth()-1, 1);
const _pk = _prev.getFullYear()+"-"+String(_prev.getMonth()+1).padStart(2,"0");
let current = MONTHS.includes(_pk) ? _pk : MONTHS[MONTHS.length-1];
let loadToken = 0;

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function checkSession() {
  try { const r=sessionStorage.getItem(SESSION_KEY); if(!r) return false; return Date.now()<JSON.parse(r).exp; } catch{return false;}
}
function saveSession() {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({exp:Date.now()+86400000}));
}

function showDashboard() {
  document.getElementById("pwScreen").style.display = "none";
  document.getElementById("rc").innerHTML = buildSkeleton();
  document.getElementById("footer").textContent = "";
  // Skeleton nhân tạo: 400ms nếu data đã cache, 1000ms nếu chưa
  const hasCache = cache[current] || (window._earlyCache && window._earlyCache[current]);
  setTimeout(() => load(current), hasCache ? 400 : 1000);
}

async function handleLogin() {
  const val = document.getElementById("pwInput").value;
  if (!val) return;
  const hash = await sha256(val);
  if (hash === PW_HASH) {
    saveSession(); showDashboard();
  } else {
    const box = document.getElementById("pwBox");
    document.getElementById("pwErr").textContent = "Mật khẩu không đúng, thử lại nhé!";
    box.classList.remove("pw-shake"); void box.offsetWidth; box.classList.add("pw-shake");
    document.getElementById("pwInput").value = "";
  }
}
document.getElementById("pwBtn").addEventListener("click", handleLogin);
document.getElementById("pwInput").addEventListener("keydown", e => {
  if (e.key==="Enter") handleLogin();
  document.getElementById("pwErr").textContent = "";
});

const bil = v => (v/1e9).toFixed(2).replace(".",",")+' tỷ';
const kk  = v => (v/1000).toFixed(0)+"K";
const mil = v => Math.round(v/1e6).toLocaleString("vi-VN")+" triệu";
function chg(a,b){if(!b||b===0)return null;return Math.round((a-b)/b*1000)/10;}
function pctOf(v,t){return t>0?Math.round(v/t*1000)/10:0;}
function sign(v){return v>=0?"+":"";}

Chart.register({
  id:"barLabels",
  afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    chart.data.datasets.forEach((ds,di)=>{
      chart.getDatasetMeta(di).data.forEach((bar,i)=>{
        const raw=ds.data[i]; if(!raw||raw===0) return;
        const text=typeof raw==="number"?raw.toFixed(2).replace(".",",").replace(/,?0+$/,"").replace(/,$/,""):String(raw);
        const p=bar.getProps(["x","y","width","height"],true);
        const barH=Math.abs(p.height), barT=Math.min(p.y,p.y+p.height), inside=barH>=28;
        ctx.save(); ctx.font=`700 13px 'Helvetica Neue',Helvetica,Arial,sans-serif`;
        ctx.textAlign="center"; ctx.textBaseline=inside?"middle":"bottom";
        ctx.fillStyle=inside?"#fff":TEXT_DEF;
        ctx.fillText(text,p.x,inside?barT+barH/2:barT-4); ctx.restore();
      });
    });
  }
});

Chart.register({
  id:"growthArrow",
  afterDraw(chart){
    if(!chart.config._growthArrow) return;
    const {value}=chart.config._growthArrow;
    if(value===null||value===undefined) return;
    const ctx=chart.ctx, isStacked=chart.options.scales?.y?.stacked;
    function getTop(ci){
      if(isStacked){let m=Infinity;chart.data.datasets.forEach((_,di)=>{const mt=chart.getDatasetMeta(di);if(mt.hidden)return;const b=mt.data[ci];if(!b)return;const p=b.getProps(["y","height"],true),t=Math.min(p.y,p.y+p.height);if(t<m)m=t;});return m===Infinity?0:m;}
      const b=chart.getDatasetMeta(0).data[ci];if(!b)return 0;const p=b.getProps(["y","height"],true);return Math.min(p.y,p.y+p.height);
    }
    function getX(ci){for(let di=0;di<chart.data.datasets.length;di++){const mt=chart.getDatasetMeta(di);if(!mt.hidden&&mt.data[ci])return mt.data[ci].getProps(["x"],true).x;}return 0;}
    if(chart.data.labels.length<2) return;
    const MARGIN=30,AL=9,ax0=getX(0)+18,ay0=getTop(0)-MARGIN,ax1=getX(1)-18,ay1=getTop(1)-MARGIN;
    const angle=Math.atan2(ay1-ay0,ax1-ax0);
    ctx.save(); ctx.strokeStyle=ctx.fillStyle="#aaaaaa"; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ax0,ay0);ctx.lineTo(ax1,ay1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax1,ay1);
    ctx.lineTo(ax1-AL*Math.cos(angle-0.38),ay1-AL*Math.sin(angle-0.38));
    ctx.lineTo(ax1-AL*Math.cos(angle+0.38),ay1-AL*Math.sin(angle+0.38));
    ctx.closePath();ctx.fill();
    ctx.font=`300 13px 'Helvetica Neue',Helvetica,Arial,sans-serif`;
    ctx.fillStyle=TEXT_DEF;ctx.textAlign="center";ctx.textBaseline="bottom";
    ctx.fillText((value>=0?"+":"")+value+"%",(ax0+ax1)/2,(ay0+ay1)/2-12);
    ctx.restore();
  }
});

function makeDonut(id,labels,data,palette){
  const canvas=document.getElementById(id); if(!canvas)return;
  if(charts[id]){charts[id].destroy();delete charts[id];}
  canvas.removeAttribute("width");canvas.removeAttribute("height");
  canvas.style.width="200px";canvas.style.height="200px";
  charts[id]=new Chart(canvas,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:palette.slice(0,data.length),borderWidth:1.5,borderColor:"#fff",hoverOffset:4}]},
  options:{responsive:false,cutout:"52%",devicePixelRatio:4,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed}%`}}},layout:{padding:0},animation:{duration:600}}});
}

async function fetchMonth(m){
  if(cache[m]) return cache[m];
  if(window._earlyCache&&window._earlyCache[m]){cache[m]=window._earlyCache[m];return cache[m];}
  const r=await fetch(API+"?month="+m);
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  cache[m]=d; return d;
}

function renderCharts(month,d,prev){
  const pi=MONTHS.indexOf(month)-1,lbl=LBL[month],pl=pi>=0?LBL[MONTHS[pi]]:null,xL=prev?[pl,lbl]:[lbl];
  const bO={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},layout:{padding:{top:50,left:4,right:4,bottom:0}},scales:{x:{grid:{display:false},ticks:{font:{size:11,weight:"300"},color:TEXT_DEF}},y:{display:false}}};
  const mkC=(id,data,color)=>new Chart(document.getElementById(id),{type:"bar",data:{labels:xL,datasets:[{data,backgroundColor:color,borderRadius:{topLeft:12,topRight:12,bottomLeft:0,bottomRight:0},borderSkipped:false}]},options:{...bO,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2).replace(".",",")+' tỷ'}}}}});
  const dt=mkC("c_dt",prev?[parseFloat((prev.totalRevenue/1e9).toFixed(2)),parseFloat((d.totalRevenue/1e9).toFixed(2))]:[parseFloat((d.totalRevenue/1e9).toFixed(2))],GREEN_BAR);
  dt.config._growthArrow={value:prev?chg(d.totalRevenue,prev.totalRevenue):null};charts["c_dt"]=dt;
  const cats=d.categories||[]; if(cats.length) makeDonut("c_cat",cats.map(c=>c.name),cats.map(c=>c.percent),PAL_CAT);
  const ch=d.channels||{}; makeDonut("c_kenh",["CC","Web","Sàn","App","Affiliate"],[ch.CC?.percent||0,ch.Web?.percent||0,ch.San?.percent||0,ch.App?.percent||0,ch.Affiliate?.percent||0],PAL_KENH);
  function stk(id,webD,appD,growVal){
    const c=new Chart(document.getElementById(id),{type:"bar",data:{labels:xL,datasets:[{label:"Web",data:webD,backgroundColor:BLUE_WEB,stack:"s",borderRadius:0,borderSkipped:"bottom"},{label:"App",data:appD,backgroundColor:GREEN_BAR,stack:"s",borderRadius:{topLeft:12,topRight:12,bottomLeft:0,bottomRight:0},borderSkipped:false}]},options:{...bO,scales:{x:bO.scales.x,y:{stacked:true,display:false}}}});
    c.config._growthArrow={value:growVal};charts[id]=c;
  }
  stk("c_wa",
    prev?[parseFloat((prev.web.revenue/1e9).toFixed(2)),parseFloat((d.web.revenue/1e9).toFixed(2))]:[parseFloat((d.web.revenue/1e9).toFixed(2))],
    prev?[parseFloat((prev.app.revenue/1e9).toFixed(2)),parseFloat((d.app.revenue/1e9).toFixed(2))]:[parseFloat((d.app.revenue/1e9).toFixed(2))],
    prev?chg((d.web?.revenue||0)+(d.app?.revenue||0),(prev.web?.revenue||0)+(prev.app?.revenue||0)):null);
  const cr=d.cr||{},pCr=prev?.cr||{};
  stk("c_sessions",
    prev?[parseFloat(((pCr.web?.sessions||0)/1e6).toFixed(2)),parseFloat(((cr.web?.sessions||0)/1e6).toFixed(2))]:[parseFloat(((cr.web?.sessions||0)/1e6).toFixed(2))],
    prev?[parseFloat(((pCr.app?.sessions||0)/1e6).toFixed(2)),parseFloat(((cr.app?.sessions||0)/1e6).toFixed(2))]:[parseFloat(((cr.app?.sessions||0)/1e6).toFixed(2))],
    prev?chg((cr.web?.sessions||0)+(cr.app?.sessions||0),(pCr.web?.sessions||0)+(pCr.app?.sessions||0)):null);
  const crC=new Chart(document.getElementById("c_cr"),{type:"bar",data:{labels:xL,datasets:[{label:"Web CR",data:prev?[pCr.web?.rate??0,cr.web?.rate??0]:[cr.web?.rate??0],backgroundColor:BLUE_WEB,borderRadius:{topLeft:12,topRight:12,bottomLeft:0,bottomRight:0},borderSkipped:false},{label:"App CR",data:prev?[pCr.app?.rate??0,cr.app?.rate??0]:[cr.app?.rate??0],backgroundColor:GREEN_BAR,borderRadius:{topLeft:12,topRight:12,bottomLeft:0,bottomRight:0},borderSkipped:false}]},options:{...bO,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+": "+c.parsed.y+"%"}}}}});charts["c_cr"]=crC;
  const dl=d.appDownloads||{};if(charts["c_tai"]){charts["c_tai"].destroy();delete charts["c_tai"];}
  const tC=document.getElementById("c_tai");tC.removeAttribute("width");tC.removeAttribute("height");tC.style.width="140px";tC.style.height="140px";
  charts["c_tai"]=new Chart(tC,{type:"doughnut",data:{labels:["iOS","Android"],datasets:[{data:[dl.ios||0,dl.android||0],backgroundColor:[BLUE_WEB,GREEN_BAR],borderWidth:1,borderColor:"#fff"}]},options:{responsive:false,cutout:"60%",devicePixelRatio:4,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${Math.round(c.parsed/(dl.retained||1)*100)}%`}}}}});
}

async function load(month){
  const token=++loadToken;
  document.getElementById("rc").innerHTML=buildSkeleton();
  document.getElementById("footer").textContent="";
  try{
    const idx=MONTHS.indexOf(month);
    const [d,prev]=await Promise.all([fetchMonth(month),idx>0?fetchMonth(MONTHS[idx-1]):Promise.resolve(null)]);
    if(token!==loadToken) return;
    document.getElementById("rc").innerHTML=buildHTML(month,d,prev);
    await new Promise(r=>setTimeout(r,0));
    renderCharts(month,d,prev);
    document.getElementById("lastUpdated").textContent="Cập nhật: "+new Date().toLocaleString("vi-VN");
    document.getElementById("footer").textContent="Nguồn: Google Sheet — An Khang Dashboard · "+LBL[month];
    // Prefetch tuần tự từ gần → xa, SAU khi tháng hiện tại xong
    (function prefetchRest(){
      const ci=MONTHS.indexOf(month),max=Math.max(ci,MONTHS.length-1-ci);
      let chain=Promise.resolve();
      for(let r=1;r<=max;r++){
        const b=ci-r,a=ci+r;
        if(b>=0) chain=chain.then(()=>fetchMonth(MONTHS[b]).catch(()=>{}));
        if(a<MONTHS.length) chain=chain.then(()=>fetchMonth(MONTHS[a]).catch(()=>{}));
      }
    })();
  }catch(e){
    if(token!==loadToken) return;
    document.getElementById("rc").innerHTML=`<div class="err-box">Lỗi tải dữ liệu: ${e.message}<br><small>Mở bằng Chrome/Safari có internet. Apps Script cần deploy với quyền "Anyone".</small></div>`;
  }
}
