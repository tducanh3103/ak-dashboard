/* ─── RESET ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── DESIGN TOKENS ──────────────────────────────────────── */

  --green-primary: #39B54A;

/* ─── TYPOGRAPHY ─────────────────────────────────────────── */
body {
  font-family: 'Helvetica Neue', HelveticaNeue, Helvetica, Arial, sans-serif;

}
.header-left { display: flex; align-items: center; gap: 10px; }

/* Logo = 1.8× line-height của text body (13px × 1.5 × 1.8 ≈ 35px) */

  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.logo-wrap img {

}

/* Header brand: cả 2 dòng font-size bằng nhau, đều bold */

/* ─── TABS ───────────────────────────────────────────────── */

}

}

/* ─── PAGE ───────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 32px 48px; }

/* ─── SLIDE ──────────────────────────────────────────────── */
.slide { background: var(--white); margin-bottom: 28px; }

/* Slide header — NO bottom divider */

<script>
/* ══════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════
   PASSWORD + PRELOAD
══════════════════════════════════════════════════════ */
const PW_HASH = "dc8f68e1937f6da455dbf7a7fc8935a539768cea2c5ad1d7170c90c709db476b";
const SESSION_KEY = "ak_auth";

// Hash password bằng SHA-256 có sẵn trong browser
async function sha256(str) {
  const buf  = await crypto.subtle.digest("SHA-256",
    new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}

// Kiểm tra session còn hiệu lực không (24 giờ)
function checkSession() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const { exp } = JSON.parse(raw);
    return Date.now() < exp;
  } catch { return false; }
}

function saveSession() {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({
    exp: Date.now() + 24 * 60 * 60 * 1000 // 24 giờ
  }));
}

function showDashboard() {
  document.getElementById("pwScreen").style.display = "none";
}

async function handleLogin() {
  const val = document.getElementById("pwInput").value;
  if (!val) return;

  const hash = await sha256(val);
  if (hash === PW_HASH) {
    saveSession();
    showDashboard();
  } else {
    const box = document.getElementById("pwBox");
    document.getElementById("pwErr").textContent = "Mật khẩu không đúng, thử lại nhé!";
    box.classList.remove("pw-shake");
    void box.offsetWidth; // trigger reflow để reset animation
    box.classList.add("pw-shake");
    document.getElementById("pwInput").value = "";
  }
}

// Gắn sự kiện
document.getElementById("pwBtn").addEventListener("click", handleLogin);
document.getElementById("pwInput").addEventListener("keydown", e => {
  if (e.key === "Enter") handleLogin();
  document.getElementById("pwErr").textContent = "";
});

// Kiểm tra session + preload data tháng mặc định trong lúc user nhập password
if (checkSession()) {
  // Đã login trước đó → hiện dashboard thẳng
  showDashboard();
} else {
  // Chưa login → âm thầm preload data trong lúc chờ
  fetchMonth(current).catch(() => {});
}
  
const API     = "https://script.google.com/macros/s/AKfycbzJaaAxK9d3rUT3RNWaoFRsWOS-KbVZM7pkSG3CJxAxIOVX-8_kYDCe55EeeifVpEqUOQ/exec";
const MONTHS  = ["2026-01","2026-02","2026-03","2026-04","2026-05"];
const LBL     = {"2026-01":"T1/2026","2026-02":"T2/2026","2026-03":"T3/2026","2026-04":"T4/2026","2026-05":"T5/2026"};
const LOGO_URL = "https://www.figma.com/api/mcp/asset/fddbaa46-5c6f-4316-bc00-dde5979aaa92";

const GREEN_BAR = "#61D836";
const BLUE_WEB  = "#00A1FE";
const TEXT_DEF  = "#333333";
const TEXT_MUT  = "#6E6E6E";

// Donut palettes
const PAL_CAT  = ["#2E8B40","#61D836","#00CCA0","#1A6B2E","#00897B","#39B54A","#004444"];
const PAL_KENH = ["#61D836","#00A1FE","#00897B","#1A6B2E","#A3D9FF"];

const cache  = {};
const charts = {};
// Mặc định hiển thị tháng ngay trước tháng hiện tại
const _now     = new Date();
const _prevMon = new Date(_now.getFullYear(), _now.getMonth() - 1, 1);
const _prevKey = _prevMon.getFullYear() + "-" + String(_prevMon.getMonth() + 1).padStart(2, "0");
let current    = MONTHS.includes(_prevKey) ? _prevKey : MONTHS[MONTHS.length - 1];
let loadToken = 0; // Token để cancel load cũ khi đổi tab nhanh

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
const bil  = v => (v/1e9).toFixed(2).replace(".", ",") + " tỷ";
const kk   = v => (v/1000).toFixed(0) + "K";
const mil  = v => Math.round(v/1e6).toLocaleString("vi-VN") + " triệu";

function chg(a,b) {
  if (!b || b===0) return null;
  return Math.round((a-b)/b*1000)/10;
}
function pctOf(v,t){ return t>0 ? Math.round(v/t*1000)/10 : 0; }
function sign(v)   { return v>=0 ? "+" : ""; }

function destroyAll() {
  Object.keys(charts).forEach(id=>{ if(charts[id]){charts[id].destroy();delete charts[id];} });
}

/* ══════════════════════════════════════════════════════
   BAR LABEL PLUGIN
   - Label inside (white bold) if bar height ≥ 28px
   - Label above  (black bold) otherwise
══════════════════════════════════════════════════════ */
Chart.register({
  id: "barLabels",
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, di) => {
      chart.getDatasetMeta(di).data.forEach((bar, i) => {
        const raw = ds.data[i];
        if (!raw || raw === 0) return;

        // Format with comma decimal (Vietnamese style)
        const text = typeof raw === "number"
          ? raw.toFixed(2).replace(".", ",").replace(/,?0+$/, "").replace(/,$/, "")
          : String(raw);

        const props = bar.getProps(["x","y","width","height"], true);
        const barH  = Math.abs(props.height);
        const barT  = Math.min(props.y, props.y + props.height);
        const inside = barH >= 28;

        ctx.save();
        ctx.font         = `700 13px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
        ctx.textAlign    = "center";
        ctx.textBaseline = inside ? "middle" : "bottom";
        ctx.fillStyle    = inside ? "#fff" : TEXT_DEF;
        ctx.fillText(text, props.x, inside ? barT + barH/2 : barT - 4);
        ctx.restore();
      });
    });
  }
});

/* ══════════════════════════════════════════════════════
   GROWTH ARROW PLUGIN
   - Runs afterDraw so chart area is fully rendered
   - Uses layout padding top to create space above bars
   - For stacked charts: sums all datasets per column
══════════════════════════════════════════════════════ */
const ARROW_PLUGIN = {
  id: "growthArrow",
  afterDraw(chart) {
    if (!chart.config._growthArrow) return;
    const { value } = chart.config._growthArrow;
    if (value === null || value === undefined) return;

    const ctx      = chart.ctx;
    const isStacked = chart.options.scales?.y?.stacked;

    // Get top-Y of each column
    // For stacked: top = topmost bar's top
    // For simple: dataset 0
    function getColTop(colIdx) {
      if (isStacked) {
        let minY = Infinity;
        chart.data.datasets.forEach((ds, di) => {
          const meta = chart.getDatasetMeta(di);
          if (meta.hidden) return;
          const bar = meta.data[colIdx];
          if (!bar) return;
          const p = bar.getProps(["y","height"], true);
          const top = Math.min(p.y, p.y + p.height);
          if (top < minY) minY = top;
        });
        return minY === Infinity ? 0 : minY;
      } else {
        const meta = chart.getDatasetMeta(0);
        const bar  = meta.data[colIdx];
        if (!bar) return 0;
        const p = bar.getProps(["y","height"], true);
        return Math.min(p.y, p.y + p.height);
      }
    }

    function getColX(colIdx) {
      // Use dataset 0 or last visible dataset for x center
      for (let di = 0; di < chart.data.datasets.length; di++) {
        const meta = chart.getDatasetMeta(di);
        if (!meta.hidden && meta.data[colIdx]) {
          return meta.data[colIdx].getProps(["x"], true).x;
        }
      }
      return 0;
    }

    const n = chart.data.labels.length;
    if (n < 2) return;

    const x0 = getColX(0);
    const x1 = getColX(1);
    const y0 = getColTop(0);
    const y1 = getColTop(1);

    // Push arrow start/end above the bar tops by a fixed margin
    const MARGIN = 30;
    const ax0 = x0 + 18;
    const ay0 = y0 - MARGIN;
    const ax1 = x1 - 18;
    const ay1 = y1 - MARGIN;

    const arrowColor = "#aaaaaa";
    const angle = Math.atan2(ay1 - ay0, ax1 - ax0);
    const AL = 9;

    ctx.save();
    ctx.strokeStyle = arrowColor;
    ctx.fillStyle   = arrowColor;
    ctx.lineWidth   = 1.5;

    // Line
    ctx.beginPath();
    ctx.moveTo(ax0, ay0);
    ctx.lineTo(ax1, ay1);
    ctx.stroke();

    // Arrowhead at end
    ctx.beginPath();
    ctx.moveTo(ax1, ay1);
    ctx.lineTo(ax1 - AL * Math.cos(angle - 0.38), ay1 - AL * Math.sin(angle - 0.38));
    ctx.lineTo(ax1 - AL * Math.cos(angle + 0.38), ay1 - AL * Math.sin(angle + 0.38));
    ctx.closePath();
    ctx.fill();

    // % label: centered on line, pushed further above it
    const midX = (ax0 + ax1) / 2;
    const midY = (ay0 + ay1) / 2;
    const lbl  = (value >= 0 ? "+" : "") + value + "%";

    ctx.font         = `300 13px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
    ctx.fillStyle    = TEXT_DEF;
    ctx.textAlign    = "center";
    ctx.textBaseline = "bottom";
    ctx.fillText(lbl, midX, midY - 12);

    ctx.restore();
  }
};
Chart.register(ARROW_PLUGIN);

/* ══════════════════════════════════════════════════════
   DONUT — fixed high-DPR backing (4×) so crisp at any
   browser zoom level. Chart.js handles the scaling.
══════════════════════════════════════════════════════ */
function makeDonut(id, labels, data, palette) {
  const canvas = document.getElementById(id);
  if (!canvas) return;

  if (charts[id]) { charts[id].destroy(); delete charts[id]; }

  // Reset to CSS size; Chart.js will set backing store via devicePixelRatio
  canvas.removeAttribute("width");
  canvas.removeAttribute("height");
  canvas.style.width  = "200px";
  canvas.style.height = "200px";

  // Use 4× so the chart stays crisp up to 400% browser zoom
  const RENDER_DPR = 4;

  const chart = new Chart(canvas, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: palette.slice(0, data.length),
        borderWidth: 1.5,
        borderColor: "#fff",
        hoverOffset: 4,
      }]
    },
    options: {
      responsive: false,
      cutout: "52%",
      devicePixelRatio: RENDER_DPR,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => `${c.label}: ${c.parsed}%` } }
      },
      layout: { padding: 0 },
      animation: { duration: 600 }
    }
  });
  charts[id] = chart;
}

   FETCH

async function fetchMonth(m) {
  if (cache[m]) return cache[m];
  const r = await fetch(API + "?month=" + m);
  if (!r.ok) throw new Error("HTTP " + r.status);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  cache[m] = d;
  return d;
}

/* ══════════════════════════════════════════════════════

function renderCharts(month, d, prev) {
  const pi    = MONTHS.indexOf(month) - 1;
  const pl    = pi >= 0 ? LBL[MONTHS[pi]] : null;
  const lbl   = LBL[month];
  const xLbls = prev ? [pl, lbl] : [lbl];

  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    layout: { padding: { top: 50, left: 4, right: 4, bottom: 0 } },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 11, family: "'Helvetica Neue', Helvetica, Arial, sans-serif", weight: "300" }, color: TEXT_DEF }
      },
      y: { display: false }
    }
  };

  const rChg = chg(d.totalRevenue, prev?.totalRevenue);

  /* ── Bar: Doanh thu tổng ── */
  const dtData = prev
    ? [parseFloat((prev.totalRevenue/1e9).toFixed(2)), parseFloat((d.totalRevenue/1e9).toFixed(2))]
    : [parseFloat((d.totalRevenue/1e9).toFixed(2))];

  const dtChart = new Chart(document.getElementById("c_dt"), {
    type: "bar",
    data: {
      labels: xLbls,
      datasets: [{
        data: dtData,
        backgroundColor: GREEN_BAR,
        borderRadius: { topLeft: 12, topRight: 12, bottomLeft: 0, bottomRight: 0 },
        borderSkipped: false,
      }]
    },
    options: {
      ...baseOpts,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.parsed.y.toFixed(2).replace(".",",") + " tỷ" } }
      }
    }
  });
  dtChart.config._growthArrow = { value: prev ? rChg : null };
  charts["c_dt"] = dtChart;

  /* ── Donut: ngành hàng ── */
  const cats = d.categories || [];
  if (cats.length) {
    makeDonut("c_cat", cats.map(c=>c.name), cats.map(c=>c.percent), PAL_CAT);
  }

  /* ── Donut: kênh ── */
  const ch = d.channels || {};
  makeDonut("c_kenh",
    ["CC","Web","Sàn","App","Affiliate"],
    [ch.CC?.percent||0, ch.Web?.percent||0, ch.San?.percent||0, ch.App?.percent||0, ch.Affiliate?.percent||0],
    PAL_KENH
  );

  /* ── Bar: Web–App stacked ── */
  const waChg = chg(
    (d.web?.revenue||0)+(d.app?.revenue||0),
    prev ? (prev.web?.revenue||0)+(prev.app?.revenue||0) : null
  );

  const waAppData = prev
    ? [parseFloat((prev.app.revenue/1e9).toFixed(2)), parseFloat((d.app.revenue/1e9).toFixed(2))]
    : [parseFloat((d.app.revenue/1e9).toFixed(2))];
  const waWebData = prev
    ? [parseFloat((prev.web.revenue/1e9).toFixed(2)), parseFloat((d.web.revenue/1e9).toFixed(2))]
    : [parseFloat((d.web.revenue/1e9).toFixed(2))];

  // Chart.js 4 stacked: dataset listed first = rendered at BOTTOM of stack
  // Web is bottom  → borderRadius 0 everywhere
  // App is top     → borderRadius only on top-left, top-right
  // Key fix: borderSkipped must be "bottom" for bottom segment, false for top
  const waChart = new Chart(document.getElementById("c_wa"), {
    type: "bar",
    data: {
      labels: xLbls,
      datasets: [
        {
          label: "Web",
          data: waWebData,
          backgroundColor: BLUE_WEB,
          stack: "s",
          borderRadius: 0,
          borderSkipped: "bottom",   // tells Chart.js NOT to apply radius at bottom
        },
        {
          label: "App",
          data: waAppData,
          backgroundColor: GREEN_BAR,
          stack: "s",
          borderRadius: { topLeft: 12, topRight: 12, bottomLeft: 0, bottomRight: 0 },
          borderSkipped: false,
        }
      ]
    },
    options: {
      ...baseOpts,
      scales: {
        x: baseOpts.scales.x,
        y: { stacked: true, display: false }
      }
    }
  });
  waChart.config._growthArrow = { value: prev ? waChg : null };
  charts["c_wa"] = waChart;

  /* ── Bar: Sessions Web + App stacked ── */
  const crData      = d.cr || {};
  const prevCrData  = prev?.cr || {};

  const sessWebData = prev
    ? [parseFloat(((prevCrData.web?.sessions||0)/1e6).toFixed(2)), parseFloat(((crData.web?.sessions||0)/1e6).toFixed(2))]
    : [parseFloat(((crData.web?.sessions||0)/1e6).toFixed(2))];
  const sessAppData = prev
    ? [parseFloat(((prevCrData.app?.sessions||0)/1e6).toFixed(2)), parseFloat(((crData.app?.sessions||0)/1e6).toFixed(2))]
    : [parseFloat(((crData.app?.sessions||0)/1e6).toFixed(2))];

  const sessChg = chg(
    (crData.web?.sessions||0) + (crData.app?.sessions||0),
    prev ? (prevCrData.web?.sessions||0) + (prevCrData.app?.sessions||0) : null
  );

  const sessChart = new Chart(document.getElementById("c_sessions"), {
    type: "bar",
    data: {
      labels: xLbls,
      datasets: [
        {
          label: "Web",
          data : sessWebData,
          backgroundColor: BLUE_WEB,
          stack: "s",
          borderRadius: 0,
          borderSkipped: "bottom",
        },
        {
          label: "App",
          data : sessAppData,
          backgroundColor: GREEN_BAR,
          stack: "s",
          borderRadius: { topLeft: 12, topRight: 12, bottomLeft: 0, bottomRight: 0 },
          borderSkipped: false,
        }
      ]
    },
    options: {
      ...baseOpts,
      scales: {
        x: baseOpts.scales.x,
        y: { stacked: true, display: false }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.dataset.label + ": " + c.parsed.y.toFixed(2).replace(".",",") + "M sessions" } }
      }
    }
  });
  sessChart.config._growthArrow = { value: prev ? sessChg : null };
  charts["c_sessions"] = sessChart;

  /* ── Bar: CR Web + App grouped ── */
  const crWebData = prev
    ? [prevCrData.web?.rate ?? 0, crData.web?.rate ?? 0]
    : [crData.web?.rate ?? 0];
  const crAppData = prev
    ? [prevCrData.app?.rate ?? 0, crData.app?.rate ?? 0]
    : [crData.app?.rate ?? 0];

  const crWebChg = chg(crData.web?.rate, prevCrData.web?.rate);
  const crAppChg = chg(crData.app?.rate, prevCrData.app?.rate);

  const crChart = new Chart(document.getElementById("c_cr"), {
    type: "bar",
    data: {
      labels: xLbls,
      datasets: [
        {
          label: "Web CR",
          data : crWebData,
          backgroundColor: BLUE_WEB,
          borderRadius: { topLeft: 12, topRight: 12, bottomLeft: 0, bottomRight: 0 },
          borderSkipped: false,
        },
        {
          label: "App CR",
          data : crAppData,
          backgroundColor: GREEN_BAR,
          borderRadius: { topLeft: 12, topRight: 12, bottomLeft: 0, bottomRight: 0 },
          borderSkipped: false,
        }
      ]
    },
    options: {
      ...baseOpts,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.dataset.label + ": " + c.parsed.y + "%" } }
      }
    }
  });
  // CR chart không dùng growthArrow vì có 2 datasets — dùng KPI text thay thế
  charts["c_cr"] = crChart;

  /* ── Donut: lượt tải ── */
  const dl = d.appDownloads || {};
  if (charts["c_tai"]) { charts["c_tai"].destroy(); delete charts["c_tai"]; }
  const taiCanvas = document.getElementById("c_tai");
  taiCanvas.removeAttribute("width");
  taiCanvas.removeAttribute("height");
  taiCanvas.style.width  = "140px";
  taiCanvas.style.height = "140px";
  charts["c_tai"] = new Chart(taiCanvas, {
    type: "doughnut",
    data: {
      labels: ["iOS","Android"],
      datasets: [{
        data: [dl.ios||0, dl.android||0],
        backgroundColor: [BLUE_WEB, GREEN_BAR],
        borderWidth: 1, borderColor: "#fff",
      }]
    },
    options: {
      responsive: false, cutout: "60%",
      devicePixelRatio: 4,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => `${c.label}: ${Math.round(c.parsed/(dl.cumulative||1)*100)}%` } }
      }
    }
  });
}

/* ══════════════════════════════════════════════════════
   LOAD
══════════════════════════════════════════════════════ */
async function load(month) {
  // Tăng token — load cũ sẽ tự bỏ kết quả khi token không khớp
  const token = ++loadToken;

  document.getElementById("rc").innerHTML = buildSkeleton();
  document.getElementById("footer").textContent = "";
  try {
    const idx = MONTHS.indexOf(month);
    const [d, prev] = await Promise.all([
      fetchMonth(month),
      idx > 0 ? fetchMonth(MONTHS[idx-1]) : Promise.resolve(null)
    ]);
    // Nếu user đã đổi sang tab khác trong lúc chờ → bỏ qua kết quả này
    if (token !== loadToken) return;

    document.getElementById("rc").innerHTML = buildHTML(month, d, prev);
    await new Promise(r => setTimeout(r, 0));
    renderCharts(month, d, prev);
    document.getElementById("lastUpdated").textContent = "Cập nhật: " + new Date().toLocaleString("vi-VN");
    document.getElementById("footer").textContent = "Nguồn: Google Sheet — An Khang Dashboard · " + LBL[month];

    // Prefetch tháng liền kề âm thầm để load nhanh khi user click tab
    const prefetchIdx = MONTHS.indexOf(month);
    if (prefetchIdx > 0)                   fetchMonth(MONTHS[prefetchIdx - 1]).catch(() => {});
    if (prefetchIdx < MONTHS.length - 1)   fetchMonth(MONTHS[prefetchIdx + 1]).catch(() => {});
  } catch(e) {
    document.getElementById("rc").innerHTML =
      `<div class="err-box">Lỗi tải dữ liệu: ${e.message}<br><small>Mở bằng Chrome/Safari có internet. Apps Script cần deploy với quyền "Anyone".</small></div>`;
  }
}

// Tabs
const nav = document.getElementById("tabNav");
MONTHS.forEach(m => {
  const b = document.createElement("button");
  b.className   = "tab-btn" + (m === current ? " active" : "");
  b.textContent = LBL[m];
  b.onclick = () => {
    current = m;
    document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    load(m);
  };
  nav.appendChild(b);
});

// Ẩn tab bar khi scroll xuống, hiện lại khi scroll lên
(function() {
  const tabWrap  = document.getElementById("tabNav");
  let lastY      = 0;
  let ticking    = false;

  window.addEventListener("scroll", () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const currentY = window.scrollY;
        if (currentY > lastY && currentY > 100) {
          // Scroll xuống → ẩn
          tabWrap.classList.add("hide-tabs");
        } else {
          // Scroll lên → hiện
          tabWrap.classList.remove("hide-tabs");
        }
        lastY   = currentY;
        ticking = false;
      });
      ticking = true;
    }
  });
})();
  
load(current);
</script>
